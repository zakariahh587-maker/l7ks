<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L7K ADMIN | SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Outfit:wght@900&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #000;
            --card: #080808;
            --border: #151515;
            --accent: #fff;
            --red: #ff3b3b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background: #050505;
            border-right: 1px solid var(--border);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: fixed;
            height: 100vh;
        }

        .nav-btn {
            background: none;
            border: 1px solid transparent;
            color: #555;
            padding: 15px;
            text-align: left;
            cursor: pointer;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
        }

        .nav-btn.active {
            color: #fff;
            background: #0a0a0a;
            border-color: var(--border);
        }

        .nav-btn:hover {
            color: #fff;
        }

        .main-content {
            margin-left: 250px;
            padding: 60px;
            flex-grow: 1;
        }

        h1 {
            font-family: 'Outfit';
            font-size: 2.5rem;
            letter-spacing: -2px;
            margin: 0 0 40px;
            text-transform: uppercase;
        }

        .section {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Products Grid */
        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .admin-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 4px;
        }

        .admin-card img {
            width: 100%;
            aspect-ratio: 1/1.2;
            object-fit: cover;
            border-radius: 2px;
            margin-bottom: 15px;
        }

        .admin-card h3 {
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .admin-card p {
            color: #555;
            font-size: 0.8rem;
            font-weight: 800;
        }

        /* Forms */
        .admin-form {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 40px;
            max-width: 600px;
            margin-bottom: 60px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            color: #555;
            margin-bottom: 10px;
            display: block;
        }

        input,
        textarea,
        select {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid var(--border);
            padding: 15px;
            color: #fff;
            font-family: inherit;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
        }

        .submit-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-weight: 950;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Drag & Drop */
        .drop-zone {
            width: 100%;
            height: 200px;
            border: 2px dashed var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.3s;
            background: #050505;
            position: relative;
            overflow: hidden;
        }

        .drop-zone:hover,
        .drop-zone.active {
            border-color: var(--accent);
            background: #0a0a0a;
        }

        .drop-zone img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
            z-index: 1;
        }

        .drop-zone span {
            font-size: 0.7rem;
            font-weight: 800;
            color: #555;
            text-transform: uppercase;
            z-index: 2;
        }

        .drop-zone i {
            color: #555;
            z-index: 2;
        }

        /* Order Table */
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card);
            border: 1px solid var(--border);
        }

        th {
            text-align: left;
            padding: 20px;
            background: #050505;
            font-size: 0.7rem;
            color: #444;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            font-size: 0.8rem;
        }

        .badge {
            padding: 5px 10px;
            font-size: 0.6rem;
            font-weight: 900;
            border-radius: 2px;
            text-transform: uppercase;
        }

        .badge-pending {
            background: #111;
            color: #555;
        }

        .badge-shipped {
            background: #fff;
            color: #000;
        }

        .action-flex {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .icon-btn {
            background: #0a0a0a;
            border: 1px solid var(--border);
            color: #555;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .icon-btn:hover {
            border-color: #fff;
            color: #fff;
        }

        .icon-btn.red:hover {
            color: var(--red);
            border-color: var(--red);
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h2 style="font-family:'Outfit'; margin-bottom: 30px; letter-spacing:-1px;">L7K SYSTEM</h2>
        <button class="nav-btn active" onclick="showSection('orders')">
            <i data-lucide="shopping-cart"></i> Commandes
        </button>
        <button class="nav-btn" onclick="showSection('inventory')">
            <i data-lucide="package"></i> Inventaire
        </button>
        <button class="nav-btn" onclick="showSection('add-product')">
            <i data-lucide="plus-circle"></i> Ajouter Produit
        </button>
    </div>

    <div class="main-content">
        <!-- ORDERS SECTION -->
        <div id="orders" class="section active">
            <h1>GESTION COMMANDES</h1>
            <table>
                <thead>
                    <tr>
                        <th>CLIENT</th>
                        <th>ARTICLES</th>
                        <th>TOTAL</th>
                        <th>STATUT</th>
                        <th>ACTIONS</th>
                    </tr>
                </thead>
                <tbody id="ordersBody">
                    <tr>
                        <td colspan="5" style="text-align:center; padding:50px; color:#222;">Chargement...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- INVENTORY SECTION -->
        <div id="inventory" class="section">
            <h1>INVENTAIRE PRODUITS</h1>
            <div class="admin-grid" id="inventoryGrid">
                <!-- Products list -->
            </div>
        </div>

        <!-- ADD PRODUCT SECTION -->
        <div id="add-product" class="section">
            <h1>NOUVEAU PRODUIT</h1>
            <form id="productForm" class="admin-form" onsubmit="handleProductSubmit(event)">
                <div class="form-group">
                    <label class="form-label">Nom du Produit</label>
                    <input type="text" id="p-name" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Prix (MAD)</label>
                    <input type="number" id="p-price" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea id="p-desc" rows="4" required></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Photo du Produit (Drop or Click)</label>
                    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                        <i data-lucide="image-plus" id="dropIcon"></i>
                        <span id="dropText">Glissez une image ici ou cliquez</span>
                        <img id="previewImg" src="" alt="Preview">
                    </div>
                    <input type="file" id="fileInput" hidden accept="image/*">
                </div>
                <div class="form-group">
                    <label class="form-label">OU URL Image (Direct Link)</label>
                    <input type="url" id="p-img" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label class="form-label">Tailles (Séparées par virgules)</label>
                    <input type="text" id="p-sizes" value="S, M, L, XL, XXL">
                </div>
                <button type="submit" class="submit-btn">PUBLIER LE DROP</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.40.0/dist/umd/supabase.js"></script>
    <script>
        const SUPABASE_URL = 'https://exqmtppdpupkesbqrfic.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_sJIZxFReSHq31in0eSATXw_4l8a0oZZ';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        async function fetchOrders() {
            const body = document.getElementById('ordersBody');
            try {
                const { data, error } = await supabase.from('orders').select('*').order('created_at', { ascending: false });
                if (error) throw error;

                if (!data || data.length === 0) {
                    body.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:50px; color:#555;">Aucune commande trouvée.</td></tr>';
                    return;
                }

                body.innerHTML = data.map(o => `
                    <tr>
                        <td>
                            <div style="font-weight: 900; color: #fff; font-size: 0.9rem;">${o.customer_name || 'N/A'}</div>
                            <div style="color: #555; font-size: 0.75rem; margin-top: 4px;">
                                <i data-lucide="phone" style="width:10px; height:10px; vertical-align:middle;"></i> ${o.customer_phone || 'N/A'}<br>
                                <i data-lucide="map-pin" style="width:10px; height:10px; vertical-align:middle;"></i> ${o.customer_city || 'N/A'}<br>
                                <i data-lucide="home" style="width:10px; height:10px; vertical-align:middle;"></i> ${o.customer_address || 'N/A'}
                            </div>
                        </td>
                        <td>
                            <div style="display:flex; flex-direction:column; gap:4px;">
                                ${(o.items || []).map(i => `
                                    <div style="background: #111; padding: 4px 8px; border-radius: 2px;">
                                        <span style="color: #fff; font-weight: 800;">${i.qty}x</span> ${i.name} 
                                        <span style="color: #555; font-weight: 900; margin-left: 5px;">[${i.size || 'N/A'}]</span>
                                    </div>
                                `).join('')}
                            </div>
                        </td>
                        <td><b style="color: #fff;">Dh ${parseFloat(o.total || 0).toFixed(2)}</b></td>
                        <td><span class="badge ${o.status === 'pending' ? 'badge-pending' : 'badge-shipped'}">${o.status}</span></td>
                        <td>
                            <div style="display:flex; gap:5px;">
                                <button class="icon-btn ${o.status === 'shipped' ? 'active' : ''}" onclick="updateOrderStatus(${o.id}, 'shipped')" title="Marquer comme expédié">
                                    <i data-lucide="check"></i>
                                </button>
                                <button class="icon-btn red" onclick="deleteOrder(${o.id})" title="Supprimer la commande">
                                    <i data-lucide="trash-2"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `).join('');
                lucide.createIcons();
            } catch (err) {
                console.error("Fetch error:", err);
                body.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:50px; color:var(--red);">Erreur lors du chargement des commandes.</td></tr>';
            }
        }

        async function fetchInventory() {
            const grid = document.getElementById('inventoryGrid');
            try {
                const { data, error } = await supabase.from('products').select('*').order('created_at', { ascending: false });
                if (error) throw error;

                if (!data || data.length === 0) {
                    grid.innerHTML = '<p style="padding:40px; color:#555;">L\'inventaire est vide.</p>';
                    return;
                }

                grid.innerHTML = data.map(p => `
                    <div class="admin-card">
                        <img src="${p.images?.[0] || 'https://via.placeholder.com/300'}" alt="">
                        <h3>${p.name}</h3>
                        <p>Dh ${parseFloat(p.price || 0).toFixed(2)}</p>
                        <div class="action-flex">
                            <button class="icon-btn red" onclick="deleteProduct(${p.id})"><i data-lucide="trash-2"></i></button>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (err) {
                console.error("Inventory error:", err);
                grid.innerHTML = '<p style="padding:40px; color:var(--red);">Erreur lors du chargement de l\'inventaire.</p>';
            }
        }

        async function handleProductSubmit(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;

            try {
                const fileInput = document.getElementById('fileInput');
                const urlInput = document.getElementById('p-img');

                let imageUrl = urlInput.value;
                if (fileInput.files && fileInput.files[0]) {
                    imageUrl = await toBase64(fileInput.files[0]);
                }

                if (!imageUrl) {
                    alert('Veuillez ajouter une photo ou un lien URL.');
                    return;
                }

                btn.innerText = 'PUBLICATION...';
                btn.disabled = true;

                const product = {
                    name: document.getElementById('p-name').value,
                    price: parseFloat(document.getElementById('p-price').value),
                    description: document.getElementById('p-desc').value,
                    images: [imageUrl],
                    sizes: document.getElementById('p-sizes').value.split(',').map(s => s.trim())
                };

                const { error } = await supabase.from('products').insert([product]);
                if (error) throw error;

                alert('Produit ajouté!');
                location.reload();
            } catch (err) {
                console.error("Submit error:", err);
                alert('Erreur lors de la publication.');
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        // Drop Zone Logic
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const previewImg = document.getElementById('previewImg');
        const dropText = document.getElementById('dropText');
        const dropIcon = document.getElementById('dropIcon');

        ['dragover', 'dragleave', 'drop'].forEach(evt => {
            dropZone.addEventListener(evt, e => {
                e.preventDefault();
                dropZone.classList.toggle('active', evt === 'dragover');
            });
        });

        dropZone.addEventListener('drop', e => {
            fileInput.files = e.dataTransfer.files;
            handlePreview(fileInput.files[0]);
        });

        fileInput.addEventListener('change', () => {
            handlePreview(fileInput.files[0]);
        });

        function handlePreview(file) {
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = e => {
                    previewImg.src = e.target.result;
                    previewImg.style.display = 'block';
                    dropText.style.display = 'none';
                    dropIcon.style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        }

        async function updateOrderStatus(id, status) {
            try {
                const { error } = await supabase.from('orders').update({ status }).eq('id', id);
                if (error) throw error;
                await fetchOrders(); // Re-render table
            } catch (err) {
                console.error("Update error:", err);
                alert("Erreur lors de la mise à jour du statut.");
            }
        }

        async function deleteOrder(id) {
            if (confirm('Supprimer cette commande définitivement?')) {
                try {
                    const { error } = await supabase.from('orders').delete().eq('id', id);
                    if (error) throw error;
                    await fetchOrders(); // Re-render table immediately
                } catch (err) {
                    console.error("Delete error:", err);
                    alert("Erreur lors de la suppression.");
                }
            }
        }

        async function deleteProduct(id) {
            if (confirm('Supprimer ce produit de l\'inventaire?')) {
                try {
                    const { error } = await supabase.from('products').delete().eq('id', id);
                    if (error) throw error;
                    await fetchInventory(); // Re-render grid immediately
                } catch (err) {
                    console.error("Delete product error:", err);
                    alert("Erreur lors de la suppression du produit.");
                }
            }
        }

        // Initial Load
        fetchOrders();
        fetchInventory();
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>

</html>
